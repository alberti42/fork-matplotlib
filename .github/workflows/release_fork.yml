---
name: Build and publish pre-release wheels (fork)

on:
  push:
    tags:
      - 'v*'
  # Manual trigger: choose version string and which platform(s) to build.
  # Useful for testing the pipeline without pushing a real release tag.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (PEP 440, no leading v — e.g. 3.10.1.post2)'
        required: true
        type: string
      platforms:
        description: 'Platforms to build'
        type: choice
        default: all
        options:
          - all
          - macos-arm64
          - macos-intel
          - linux-x86_64
          - linux-arm64
          - windows-x86_64
          - windows-arm64

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── 0. Compute build matrix ────────────────────────────────────────────────
  # Outputs a JSON matrix so that tag-push builds all platforms while a manual
  # dispatch can target a single one.
  setup:
    name: Compute matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Select platforms
        id: matrix
        run: |
          MACOS_ARM='{"name":"macOS arm64","os":"macos-14","cibw_archs":"arm64","cibw_extra":"MACOSX_DEPLOYMENT_TARGET=11.0"}'
          MACOS_INTEL='{"name":"macOS Intel","os":"macos-15-intel","cibw_archs":"x86_64","cibw_extra":"MACOSX_DEPLOYMENT_TARGET=10.12"}'
          LINUX_X86='{"name":"Linux x86_64","os":"ubuntu-latest","cibw_archs":"x86_64","cibw_extra":""}'
          LINUX_ARM='{"name":"Linux arm64","os":"ubuntu-24.04-arm","cibw_archs":"aarch64","cibw_extra":""}'
          WIN_X86='{"name":"Windows x86_64","os":"windows-latest","cibw_archs":"AMD64","cibw_extra":""}'
          WIN_ARM='{"name":"Windows arm64","os":"windows-11-arm","cibw_archs":"ARM64","cibw_extra":""}'

          PLATFORM="${{ inputs.platforms }}"
          # Tag pushes always build everything.
          if [[ "${{ github.event_name }}" == "push" || "$PLATFORM" == "all" ]]; then
            ENTRIES="[$MACOS_ARM,$MACOS_INTEL,$LINUX_X86,$LINUX_ARM,$WIN_X86,$WIN_ARM]"
          elif [[ "$PLATFORM" == "macos-arm64" ]]; then
            ENTRIES="[$MACOS_ARM]"
          elif [[ "$PLATFORM" == "macos-intel" ]]; then
            ENTRIES="[$MACOS_INTEL]"
          elif [[ "$PLATFORM" == "linux-arm64" ]]; then
            ENTRIES="[$LINUX_ARM]"
          elif [[ "$PLATFORM" == "windows-x86_64" ]]; then
            ENTRIES="[$WIN_X86]"
          elif [[ "$PLATFORM" == "windows-arm64" ]]; then
            ENTRIES="[$WIN_ARM]"
          else
            ENTRIES="[$LINUX_X86]"
          fi
          echo "matrix={\"include\":$ENTRIES}" >> $GITHUB_OUTPUT

  # ── 1. Build the source distribution ──────────────────────────────────────
  build_sdist:
    name: Build sdist
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      SDIST_NAME: ${{ steps.sdist.outputs.SDIST_NAME }}
      VERSION:    ${{ steps.version.outputs.VERSION }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Derive version from the tag (push) or from the manual input (dispatch).
      # Exported both as an env var (for the sdist build below) and as a job
      # output (forwarded to build_wheels via needs context).
      - name: Set version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
          fi
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$V" >> $GITHUB_ENV
          echo "VERSION=$V" >> $GITHUB_OUTPUT

      # LICENSE_QHULL is downloaded at build time and must exist before the
      # sdist is packaged so that it ends up inside the wheel later.
      - name: Pre-download bundled licenses
        run: >
          curl -Lo LICENSE/LICENSE_QHULL
          https://github.com/qhull/qhull/raw/2020.2/COPYING.txt

      - name: Install build
        run: pip install build

      - name: Build sdist
        id: sdist
        run: |
          python -m build --sdist
          python ci/export_sdist_name.py

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # ── 2. Build wheels ────────────────────────────────────────────────────────
  build_wheels:
    name: Build wheels – ${{ matrix.name }}
    needs: [setup, build_sdist]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Download sdist
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - name: Build wheels (CPython 3.11 – 3.13)
        uses: pypa/cibuildwheel@v3.3.1
        with:
          package-dir: dist/${{ needs.build_sdist.outputs.SDIST_NAME }}
        env:
          CIBW_BUILD: "cp311-* cp312-* cp313-*"
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          # Propagate the version into the inner build environment.
          CIBW_ENVIRONMENT: >-
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ needs.build_sdist.outputs.VERSION }}
            ${{ matrix.cibw_extra }}
          # Remove stale build artefacts before each wheel build.
          CIBW_BEFORE_BUILD: rm -rf {package}/build
          # On Windows, force MSVC (via --vsenv) so meson does not pick up MinGW
          # from PATH, which cannot link ARM64 PE DLLs. Also link the CRT
          # statically while keeping VCRUNTIME140.dll and the UCRT shared,
          # matching the upstream matplotlib wheel configuration.
          CIBW_CONFIG_SETTINGS_WINDOWS: >-
            setup-args="--vsenv"
            setup-args="-Db_vscrt=mt"
            setup-args="-Dcpp_link_args=['ucrt.lib','vcruntime.lib','/nodefaultlib:libucrt.lib','/nodefaultlib:libvcruntime.lib']"
          # On Windows, install delvewheel and bundle required DLLs into the wheel.
          CIBW_BEFORE_BUILD_WINDOWS: pip install delvewheel && rm -rf {package}/build
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: delvewheel repair -w {dest_dir} {wheel}
          # Skip post-install tests – some may fail on a fork build.
          CIBW_TEST_SKIP: "*"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.cibw_archs }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  # ── 3. Publish to GitHub Releases ─────────────────────────────────────────
  # Skipped on manual dispatches (no tag → no release); wheels are still
  # available as workflow artefacts for inspection.
  publish:
    name: Create pre-release
    needs: build_wheels
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Create GitHub pre-release and attach wheels
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: dist/*.whl
